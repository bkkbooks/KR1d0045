  - {type: page-break, offset: 0, content: '', id: KR1d0045_WYG_002-1a, image: WYG0109/WYG0109-0814c.png}
body:
  text: 宫室考卷下宗人府府丞任啓運撰天子殷屋四注四霤諸侯四注三霤大夫夏屋二注二霤士二注一霤鄭曰天子諸侯屋用殷制四阿四注卿大夫以下屋用夏制前後二注孔曰阿棟也四阿四面皆有正棟霤承檐也諸侯士皆無後霤愚按注者水之所流霤則所以受水鄭謂以木為之用行水亦宫之飾今宫中有承霤以銅為之是也若中霤則中室也古人陶穴上受明處雨則溜入焉名曰中霤後人因名室中為中霤祀土神于此所謂家主中霤喪禮浴于中霤其實室中無溜與檐霤逈别也郝氏敬謂中霤非室中乃四檐天井中混而合之大謬矣天子之堂廣九雉公侯七雉伯子男五雉士三雉三分其廣以二為內五分其內以一為髙東房四房北堂各三雉大傳雉長三丈以二為內室深六雉以一為髙髙三丈六尺天子之堂九尺諸侯七尺大夫五尺士三尺尺一等等階之級也夏階一尺殷三尺周彌髙矣天子諸侯朝寢居中廟社左右大夫士左廟右寢若有邑大夫亦當有社稷天子諸侯左右夾室大夫士有東夾無西夾按此從金氏履祥說若鄭氏讀大夫士無西房則不然敖氏繼公曰聘禮賔受圭退負右房大夫明有西房矣鄭因士喪禮髽于室故云然不知此尊卑異禮耳天子諸侯有樹屏大夫以簾士以帷孔云此禮緯文或云大夫以帷士以簾誤天子之牆賁墉諸侯疏杼大傳賁大也大牆上下正直疏殺也杼亦牆名也裒殺其上不得正直髙曰墉卑曰垣墉宫也亦城也垣援也人所依阻以為援衛也牆厚三尺崇三之牆所以備非常也此上下通名士曰壁壁辟也辟禦風寒也天子諸侯之楹黝堊大夫蒼士黈楹亭也亭亭然孤立旁無所依天子之桷斫之礱之加密石焉諸侯礱之大夫斫之士首之首之止斫其本而已右等威傳禮有以大為貴者有以髙為貴者有以文為貴者宫室之度貴賤之等級記乃立五宫大廟宗宫考宫路寢明堂咸有四阿反坫重九重廊重常復格藻梲移旅盈憃常畫內階𤣥陛堤塘山牆應門庫臺𤣥閫逸周書四阿見上坫堂角及坫向外也重九一作重充纍棟也重廊室外有廡重常舊注常纍係也未知何物復格疑即重檐藻梲梲上畫藻移旅樹屏之可移者如明堂本無屏有事于此則外設之盈蠢未詳盈一作楹舊云藻井之飾常畫凡柱皆畫內階北階也或曰特設之中階所謂納陛也𤣥陛以黑石為陛堤塘唐中髙如堤今丹墀也山牆牆畫山雲應門天子之制故路寢明堂皆有之也庫臺以貯重器舊云皆為臺門閫門限也以黑石為門限也辟雍太廟明堂同制漢蔡氏雍常言之宗宫考宫他書不見豈考宫即辟雍宗宫即明堂以宗祀則謂之宗宫以布政則謂之明堂二而一歟山節藻梲復廟重檐刮楹達鄉反坫出尊崇坫康圭疏屏天子之廟飾也明堂位刮楹刮楹使滑礱之加密石也達鄉太祖廟道從三昭三穆間直出也坫詳下文疏屏刻鏤之使文理疏通似網謂之罘罳然則諸侯內屏完好不疏刻歟周而立者謂之柱柱最大者謂之楹楹上斗栱謂之節節上亘而任重謂之棟四面各一正棟謂之阿棟上短柱謂之梲短小謂之侏儒當脊亘者謂之檼檼謂之桴其前後降者謂之楣又降謂之屐重檐謂之梠自檼下交楣者謂之閲交屐謂之榱圓曰椽方曰桷周曰椽魯曰桷柱柱也柱地以立楹在堂負榱楹四柱二十四也節如斗而方名櫨又名栥名栭其長連兩桁者名關又名欂名棙今曰連枅棟今名大梁梲在梁上支檼者餘短柱統名侏儒今名同柱檼脊棟也今名脊桁楣今名步桁屐今名簷桁梠侣屐以近滴水故亦名樀閲榱桷皆椽也屋上簿謂之筄屋上脊謂之危翼謂之榮周謂之廡檐謂之宇宇下水謂之溜承溜謂之霤筄音曜屋笮也以竹葦為之以木板曰杗危髙也翼如鳥翼今名槮桷廡室中屋覆及階承溜今名槅漏柱下石謂之礎堂角謂之坫庋食謂之坫兩楹間反爵謂之坫康圭謂之坫礎鑿石為之易謂之磐以載楹柱者坫築土為之堂角之坫在夾室外士冠禮待于西坫南既夕禮南順齊于坫是也度食之坫在室中內則士于坫一是也反爵之坫髙二尺上加木坫髙八寸足二寸漆赤中奠圭之坫則髙三尺故云崇也兩階間謂之鄉北出牖謂之向宫中弄謂之壺郭云天子嚮明而治故兩階間謂之鄉明堂達鄉亦謂太廟太室與四親廟直出鄭謂太廟每室入牖鄉牖也按詩塞向指北小牖文亦作向非鄉也弄巷通王曰今宫中永巷右名物朝門謂之應即應門廟門謂之祊一作閍宫中門謂之闈小闈謂之閨小閨謂之閣里門謂之閈弄門謂之閎門上謂之楣下謂之閾中直窒扉謂之闑兩旁立者謂之棖闔謂之扉扉竒謂之扇偶謂之闔左闔謂之賔門竒曰戶偶曰門內曰戶外曰門竹葦曰戶木曰門闔門之木謂之扃兩旁夾門謂之閫制開闔者謂之樞樞謂之椳闑短橛當兩闔中棖長椳今名壁貼閫亦作捆扣也人出入則扣觸之庋食謂之閣尊典謂之閣重戶謂之閣閣髙也飲食不可置諸地故為閣以庋之所尊貴者皆置諸閣故典字從册在丌上之形自漢以後祕閣龍圖閣天章閣文淵閣皆藏經史使大臣典之因稱大臣曰閣老與閣異義也應門容二徹三個路門不容乘車之五個廟門容大扃七個闈門容小扃三個賈氏公彥曰二徹八尺愚按二徹一丈六尺又三倍之則四丈八尺也乘車六尺六寸五個則三丈三尺言不容特稍隘耳鄭謂二門乃容一門半之按大傳堂廣十八丈室廣六丈則門亦應廣六丈去棖闑所占其所容如是也鄭注聘禮廟門容二徹三個旁加一步賈云一丈二尺意此即兩棖所占歟大扃長三尺七個二丈一尺小扃長二尺三個六尺闈門以下應遞殺也右門記正門謂之應門爾雅九采之國應門之外北面東上明堂位詩祝祭于祊祊廟門內君平日待賔客之處也禮夫人奔父母喪入自闈門升自側階雜記不升阼階不為喪主不升西階不敢同于女賔也父母在閨門之地戲而不嘆坊記史汲黯卧閨閣內不出毛晃曰唐制立仗宣政殿不御前殿則喚仗後紫宸殿羣臣從東西閣門入謂之入閣按此閣已非古人閨閣之閣矣然猶是門與閣異義左傳盟諸僖閔僖公廟門蓋周公廟門達鄉左昭右穆則兩弄相對閎其弄頭門也髙其閈閎應氏劭曰閈扞也為人扞難初學記城外郭內之里門汝南平輿里門曰閈廣韻訓垣非是爾雅所以止扉謂之閎郭云門旁長橛愚謂門樞必附于棖棖髙則門必髙故杜注言閈閎門也記君入門介拂闑大夫中棖無闑之間士升拂棖此謂兩君相朝君來朝之君也大夫不中門此中棖闑間從君非當尊且行非立也舉賔而主君臣可知介北面東上擯北面西上賔入不中門行不履閾此謂來聘之卿大夫孔曰履閾則自髙且不淨並為不敬公事自闑西私事自闑東俱玉藻鄭曰公事謂聘享私事謂覿面孔曰自闑西用賔禮也自闑東從臣禮也大夫士出入君門由闑右不踐閾曲禮此謂本國之臣凡宫室謂東為左此以東為右者門以向堂為正也盧氏植注愚按天子門雖外向其左右亦然故治朝之位先路門者畢公率東諸侯入應門右左為賔門故來子曰無賔客則常闔其左君出入皆以右鄭曰臣亦由右統于君也饒氏魯謂君由左出以東為左入以西為左臣由右出以西為右入以東為右誤矣閏月闔門左扉立於其中玉藻按朱子云左扉常闔是不獨閏月也蓋視朝必出門外出則兩扉俱闔閏月則不出而立于棖闑之中壻見主婦主婦闔扉立于其內士昏禮闔東扉主婦立于其內士喪禮鄭曰扉左扉賈曰東扉也按東扉主所由婦人迎送不出門故雖見人亦闔之序則物當棟堂則物當楣鄉射禮物以丹若墨畫物作十字為射者所履之地序無室故當棟堂有室故前當楣賔升西階當阿東面致命士昏禮賔納采之使阿棟也廟亦有室而賔當阿鄭云入堂深示親親也主人阼階當楣拜賔西階當楣答拜鄉飲酒禮賈曰楣前梁天子之閣左達五右達五公侯伯于房中五大夫于閣三士于坫一內則孔曰序外有夾室天子尊庖㕑逺故左右夾室各為五閣以庋食諸侯卑庖厨稍近故降于天子一房中為五閣大夫卑無嫌故亦于夾室而閣三士卑不得作閣但于室中為坫而已愚謂閣以庋食物之常需者猶養老飲食從于遊耳與庖厨何與若閣即庖厨則于禽獸日見死聞聲矣安可也明堂上圓下方為廟者五為室者九為堂者十二堂三為一南明堂北𤣥堂東青陽西總章中太廟太室四阿入達重屋庭周之四廟位諸正入室位謂隅室四戶戶兩牖庭周之階九方二午中一上圓以象天下方以象地廟五中大廟及四太廟也室九中太室及四隅入室也十二堂室前之地以應十二月三為一三月共一時也南向陽故曰明北向幽故曰𤣥東屬木色青陽所自起故曰青陽西物成總收皆可章度故曰總章阿棟也四面各有正棟八達四面皆開直達外四太廟重屋若後世之樓其上為太廟其下為太室秦漢稱神人好樓居以此也室四戶故三十六戶戶隅牖故七十二牖也九室皆庭周之則戶有可出牖有所受明也蓋分其地縱橫皆五為二十五區中一區太廟太室其周八區為內庭外周十六區四隅虛四區使上可圓四面各三區中為太廟左右為夾室室之前為堂也階九者四面各有東階西階唯南明堂之前有一中階階下為外庭也右明堂記神農曰天府黃帝曰合宫陶唐曰衢室有虞曰總章尸子按有所聚之謂府穹窿在上之謂宫旁有所窒之謂室天府其聚享百神于此乎曰宫則上必覆之曰合猶不分祀也曰室則疑有牆矣曰衢則四達可知唐民有康衢之歌而此曰衢室則不惟祀神且以達民隱矣書所謂明四目達四聰即其義也曰總章則布政于斯而曰總則猶合之也夏曰世室五室考工記至此始分室矣殷曰陽館尸子曰陽向明而治也重屋考工記詳上注及下黃帝合宫四面無壁覆以茅茨史記漢武帝時濟南公王帶所上圖按上古朴略黃帝必實如是夏后氏世室堂修二七廣四修一舊注夏度以步步六尺修深也深十四步其廣加四分之一廣十七步半愚按室前為堂則太廟深八丈四尺廣十丈五尺五室三四步四三尺舊注三四步室方也四三尺益廣也按三四十二步則深七丈二廣如丈二則八丈四視中稍狹矣九階見上四旁謂室四戶夾窗謂戶兩牖門堂三之二室三之一按門堂室不言廣廣必與內堂室一也但每問分堂之修為三堂得其二室得其一視內為淺耳殷人重屋堂修七尋堂崇三尺四阿重屋殷度以尋尋八尺七尋則五丈六尺按殷人不應視夏反狹三丈餘豈此但言上所重之屋四阿之內而四阿之外亦視此歟周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵並考工記九筵八丈一尺七筵六丈三尺孔曰夏階一尺殷階三尺周九尺相參之數也按此則每室二筵句大可疑夏之正室廣十丈五尺左右室廣八丈四尺而周反減至八丈一尺歟周路寢廣九雉以二為內堂廣十八丈中正室廣六丈豈合明堂九室十二堂而僅廣八丈一尺歟且下言室中度以几堂上度以筵是九筵止以度堂上而此句及五室字皆訛文不足據也明堂右有之也凡九室二九四七五三六一八見九室合洛書九宫九室十二堂室四戶戶二牖凡三十六戶七十二牖赤綴戶也白綴牖也其宫方三百步在近郊三七一作十誤里此天子之路寢也大戴盛德淳于登曰明堂在國之陽丙巳之地三里之外七里之內按徑百步為里自三里至七里中得三百步也言與路寢同制則廣大可知明堂方百四十四尺坤之䇿也屋園屋徑二百一十六尺乾之䇿也太廟方三十六丈通天屋徑九丈隂陽九六之變也圜蓋方載六九之道也八闥以象八卦九室以象九州十二宫以應辰三十六戶七十二牖以四戶八牖乘九室之數也外戶設而不閉示天下不藏也通天屋髙八十一尺黃鍾九九之實也二十八柱列于四方亦七宿之象也堂髙三丈以應三統四鄉五色象五行外廣二十四丈以應二十四氣四周以水象四海也蔡雍獨斷此以法象言之然亦有訛文如太廟方三十六丈皆是也闕其疑而以理斷之則大戴言宫方三百步其地廣矣作雒言太廟路寢明堂如一其制備矣大𫝊言路寢通廣二十七丈正室廣六丈夾室廣四丈五尺不應明堂𥚹小止每室二筵如蔡說外廣二十四丈分為五區虛外二區中為堂十四丈四尺夾室四丈三尺太室六丈于理近之是三十二字衍文也屋圜屋上圜也屋徑自上頂下垂及宇也下通天屋徑則言其髙也言髙九丈又言八十一尺蓋黃鍾之法以九寸為尺則亦可以九尺為丈舉異義也階大戴言三尺則太卑此言三丈則太髙考一言九尺則得之蓋古言三尺者三而𫝊者答誤也孟春之月天子居青陽左個仲春青陽太廟季春青陽右個孟夏明堂左個仲夏明堂太廟季夏明堂右個秋總章孟左個仲太廟季右個如之冬𤣥堂亦如之中央土太廟太室吕氏春秋閏月闔門左扉立于其中玉藻按考工言五室大戴言九室後儒二說爭衡鄭氏謂土居中水火金木各居四維交以用事魏李謐謂考工得之丑室謬于堂之修廣大戴得之戶牖失之九室朱子謂想是一個三間九架屋子五方四隅分為九室青陽之右個即明堂之左個明堂之右個即總章之左個𤣥堂至青陽亦然則九室即五室與四太廟而九愚謂如朱子說止三間屋子則三十六戶七十二牖都無可施四仲有堂無室蓋季有室無堂李謐于考工取五室于大戴取戶牖則一室得七戶十四牖尚戶餘一牖餘二何以厝之蓋明堂有廟有室有堂廟以事神室以安身堂以布政上古朴略自無可分至夏五室則廟居正室居隅中一室為廟為堂以事神布政猶合宫衢室之義也冬至入東北之室春分遷而東南夏至西南秋分西北各居九十一日鄭謂水木用事交于東北木火用事交于東南火土用事交于西南金水用事交于西北原不誣也殷人尊神于是中為重屋而上以事神下可偃息夏季居之周公宗祀文王于明堂而變四為八以應十二辰丑寅二室位于東北辰巳二室位于東南未申二室位于西南戍亥二室位于西北子午邜酉當四廟之正而總以太室為所居故廟與室與堂有分有合中為太廟太室言上為太廟下為太室此廟與室地合而用實分也分祀五帝則明堂𤣥堂青陽總章合此太廟而五以為偃息則四左個四右個合此太室而九也若班布政令則布政之時初無祭祀之事即以四太廟為太室之前堂故明堂𤣥堂早被以堂之名此廟與堂用分而并合者也故李謐爭四室不可居隅者此誤以室為廟不知廟自居正室自居隅也爭戶牖之間不容斧依者人誤以室為堂不知朝必于堂不于室也袁翻譏薛綜室外為堂之說為巨異止知有九室不知宫寢之堂在室外此明堂𤣥堂亦在大室外即入室之前亦有餘地為堂也考其規制則考工所謂四阿重屋専指太廟而言白虎通所謂四闥亦専指太廟蔡雍謂二十八柱鄭謂交以用事則専指入室而言大戴三十六戶七十二牖則通九室而惟丈尺之制有不盡合者則酌古今文質之宜度事勢煩簡之異則周必文于夏商而太廟路寢行燕饗諸禮明堂無之則稍狹其或以是也歟孟子曰夫明堂者王者之堂也昔者大朝諸侯于明堂天子負斧依南鄉而立周公率卿士侍于左右三公中階之前北面東上諸侯阼階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上逸周書九采之國應門之外北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上四塞世告至此周公明堂之位也明堂也者明諸侯之尊卑也逸周書作九采之國世告至者應門之外北面東上明堂位李氏巡曰九夷𤣥荒樂浪髙麗滿飾鳬叟索家東屠倭人夭鄙八蠻天竺咳首僬僥跂踵穿胸儋耳狗軹旁舂六戎僥夷戎夷老白耆羌鼻息天剛五狄月支濊貊胸奴單于白屋也此不必盡至但世見終五逺之故列之門外方明為宫三百步旁一門壇十有二尋三成深四尺加方明其上宫築土為埒其象如宫也明堂方三百步此不言方蓋明堂五廟九室十二堂南三門餘二門故需地九百畝此惟一壇方一門止需地三百畝也八尺曰尋成猶重也自下仰上謂之髙自上臨下謂之深壇廣九丈六尺髙一丈六尺分四等每等狹一丈二尺三成共狹七丈二尺則上正方二丈四尺方明木為之方四尺設六色上蒼璧下黃琮東青圭南赤璋西白琥北黑璜以告天也西方之神為明質也右方明壇傳朝日而退為壇以合諸侯天子土揖庶姓時揖異姓天揖同姓所以别親疏外內也土揖下其手天揖上其手時揖得其中異姓王外親如齊杞庶姓若妘姓允姓諸侯將幣公于上等侯伯于中等子男于下等所以别貴賤序尊卑也大戴禮司儀將合諸侯令為壇詔王儀秋官鄭曰此謂時㑹殷同王氏曰古者天子巡狩諸侯朝覲皆為壇所謂有事而㑹不協而盟為盟尸也祭于廟燕于廟之寢詩傳春朝于朝秋覲于廟曲禮注受聘享于祖廟饗食賔于禰宫燕賔于路寢聘禮疏宗祀于明堂巡狩于方嶽泰嶽有明堂今遺址尚存餘無傳者殷同時㑹于方明之宫覲禮疏皆天子之禮也右通論記諸侯前朝受舍于朝受次于文王廟之門外同姓西面北上異姓東面北上天子朝諸侯旅見然必分同異姓所謂周之宗盟異姓為後若至有先後則亦以次見之所謂既月曰覲四嶽羣后也辟雍水周之為學者五中成均左之前曰東膠左之後曰東序右之前曰瞽宗右之後曰虞庠其在郊南學曰東膠北學曰虞庠東東序西瞽宗如之天子曰辟雍諸侯曰泮宫雍壅也四周壅水以節觀者形圓如璧故謂之辟雍其規制與明堂相似青陽一區即東學明堂一區即南學總章一區即西學元堂一區即北學其正即天子蒞學養老之堂其左右個則士子習學之黌舍也諸侯不具五學止立周之東膠賜則立二學三學如魯有東序有瞽宗也北面無水東西或有或無總不能圓如半璧而已故曰泮宫右辟雍詩於論鼓鐘於樂辟雍文王初作此制而後世因以為天子之學鎬京辟雍自西自東自南自北無思不服言武王于辟雍講學行禮而天下服而其規制亦可想矣孟子曰夏曰校殷曰序周曰庠學則三代共之董子曰五帝太學曰成均言所成就者公平周遍記有虞氏養國老於上庠養庶老于下庠夏后氏養國老于東序養庶老于西序殷人養國老于右學養庶老于左學周人養國老于東膠養庶老于虞庠在國之西郊王制先儒謂養國老太學養庶老小學虞殷貴右夏周貴左愚按據此則當虞曰庠夏曰序矣與孟子異古之教者家有孰黨有庠術有序國有學學記二十五家為閭閭有孰大夫家之幼學亦名孰五百家為黨術陳讀州二千五百家為州鄭讀遂萬二千五百家為遂愚謂二說一也六遂為內諸侯食邑比外諸侯視天子六卿皆降一等則侯國六遂二千五百家乃有庠萬二千五百家乃有序又應脫鄉有校一句天子六卿六校外諸侯一國一校鄭人遊于鄉校是也蓋諸侯之校即為國學是也春誦夏絃太師詔之瞽宗秋學禮冬讀書禮在瞽宗書在上庠春夏學干戈秋冬學羽籥皆於東序語說命乞言大樂正授數小樂正詔之大司成論說在東序皆文王世子誦謂誦詩絃謂琴瑟春夏陽故教之以聲秋冬隂故教之以事就樂分之則干戈舞蹈陽羽籥寧靜隂然亦大槩如此所謂時教必有正業非春夏必不可習禮讀書秋必不可讀詩也語曰樂正司業父師司成則大小樂正皆司業大司成其父師歟師氏居虎門左教國子以三德三行三德至德敏德孝德也三行孝行友行順行也保氏養國子以六藝六儀蔡雍曰師氏居東南則保氏居西北六藝五禮六樂五射五御六書九數也六儀祭祀賔客朝庭喪紀軍旅車馬之容也大司徒以鄉三物六德六行六藝教萬民而賔興之六德知仁聖義中和六行孝友睦姻任恤六藝見上大樂正掌成均之法以樂德樂語樂舞教國子俱周禮樂德中和祇庸孝友樂語興道諷誦言語樂舞雲門大卷大咸大韶大濩大武樂正崇四術立四教順先王詩書禮樂以造士王制教各以時謂之術天子旦入東學晝入南學昃入西學莫入北學太學在中央天子所自學也易太初篇帝入東學上親而貴仁入西學上賢而貴德入南學上齒而貴信入北學上貴而尊爵入太學承師而問道傳保篇日出居東門膳夫相禮日中居南闈見九侯反問子相日側居西闈視五國之事日入出北闈視帝即猷大明堂禮此文疑訛闕天子視學命有司祭先師先聖適東序釋奠于先老設三老五更羣老之席位世子記祀先賢于西學樂記古者王子年八嵗出就外舍學小藝履小節束髮就大學學大藝履大節焉大戴禮公卿之太子大夫元士之適子十有三年入小學餘子十八入太學見大節踐大義焉大傳王太子任天下之重有位之適皆世佐其君故教之早餘子反有先入大學者其質敏也鄉大夫受教法于司徒頒之于其鄉吏以嵗時入其書三年大比考其德行道藝獻賢能之書于王周禮地官其鄉吏自州長黨正下及族師閭胥比長遞教之比之而書之以上聞也命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升于司徒者不征于鄉升于學者不征于司徒曰造士王制升之司徒即用為鄉遂之吏所謂民材也其秀者又升之國學大樂正論造士之秀者以告于王而升諸司馬曰進士此由國學出所謂官材也小學在公宫南之左大學在郊俱王制以上皆天子學制此乃言諸侯也諸侯嵗貢士于天子射義按先儒論學言人人殊不知天子必備五學四郊四與太學而五而太學中又備四學之制不然四學在郊去國三百里周而巡之且于二里而自朝至莫一日能入四學乎諸侯止立時王一代之學賜則有二學三學者然非一國止一學二學也自公宫以及閭巷莫不有學其在天子則虎門之左王子入焉所謂青宫育德之地也諸侯不敢與天子正同故在公宫南之左其與君之子同入此學者必極一時之選如成王則伯禽吕伋其選也其餘卿大夫之子則其家擇師教之亦謂之孰惟庶民之子乃入二十五家之里孰此謂之小學以教小子者也庶民之子不能有成則十六授田二十五畝為餘夫矣其可教則遞升之入于黨之庠又升入于州之序又升乃入于鄉之校若卿大夫之子由其家孰出即入鄉之校諸侯之國無校則出即入于國之學故曰諸侯之太學在外將出而貢之天子也要其所教亦本國自用者多耳若天子則六鄉六遂其士已多而又有諸侯所貢之士一國學不足以容故四郊先為四國學南之東曰東膠北之東曰東序南之西為瞽宗北之西為虞庠各以其方居之而猶掌于司徒再升乃入成均之學而在國之中故曰天子之太學在內將收天下之賢才而用之也天子之子自虎門之學出即入于此南學之東膠故東序瞽宗上庠皆學士所居而東膠王子居之也然則雖與王子齒而起居微别矣東膠養致仕之老東序養老更之老瞽宗養死事之老虞庠養庶老皆國學也先儒不明小學大學之分以年鄉學國學之分以地鄉學國學皆有大小而以養國老者為大學養庶老者為小學并謂王子八嵗即逺至三百里之郊學其謬甚矣宫室考卷下
