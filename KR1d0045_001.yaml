body:
  text: 宫室考卷上宗人府府丞任啓運撰天子之門五郭門謂之臯臯內謂之庫庫內謂之雉雉內謂之應應內謂之路孔氏穎達曰郭門公之外門鄭氏康成曰在城門內愚謂城外有郭而城內又有郭者郭之言廓就宫言之此又其廓然者也臯緩也逺也髙也告也鄭曰言最外而逺也庫謂有藏于此者也愚疑府庫之藏在此門內左右雉陳也理也李景齊曰晝雉焉故謂之雉鄭曰取其文明也應謂居此以應治也路取其大也愚謂內外之界于此分自內而出自外而入必由此也吳鼐曰王之車馬及鼓皆尊大之故皆曰路雉門謂之中門應門謂之正門路門謂之畢門又謂之虎門又記異名也雉門在五門中故謂之中門先鄭謂臯內為雉雉內為庫誤矣爾雅有正門蓋治朝在應門內應治出政故治朝又謂之正朝路門又曰畢者五門至此而畢也葉氏時曰以畫虎故又曰虎門諸侯之門三庫內謂之雉雉內謂之路諸侯三門下天子也劉氏敞曰天子諸侯皆三門天子曰臯應畢諸侯曰庫雉路非是鄭曰諸侯之宫外門曰臯朝門曰應亦誤朱子曰書言王出應門之內春秋書魯雉門災禮記言魯有庫門家語言衛有庫門皆無言有臯應者則臯應為天子之門明矣愚按今左傳宋歌臯門之晢陸氏德明曰本作澤門宋東城門今作臯者誤也門天子外向諸侯內向外向所受逺也內向所受近也鄭曰魯庫雉二門二兼四孔曰兼四者兼內向外向也大夫士二門孔疏門大門寢也右門詩乃立臯門臯門有伉乃立應門應門將將大雅伉髙貌將將嚴正也朱子曰太王特作此二門後世因以為天子之制諸侯不得立焉記庫門天子臯門雉門天子應門明堂位言魯之庫雉二門其制似天子臯應之門所謂二兼四矣觀此則諸侯不得有臯應明甚竹書成王元年春庚午周公誥諸侯于皇門皇門他書不見疑即路門也康王之誥王出廟門立應門內親報誥之成王幼不能親誥故周公代王誥之合下節看周公不居中而偏左也逸周書維正月庚午周公格左閎門晉孔朝注閎音皇路寢左右門曰皇門書逆子釗于南門之外顧命此南門即路門也王出在應門之內太保率西方諸侯入應門左畢公率東方諸侯入應門右康王之誥此即路門外治朝之地二人雀辨執惠立于畢門之內顧命此即路門內春秋雉門及兩觀災定公新作南門僖公胡氏安國曰南門南非一門雉庫皆是杜氏預曰魯城南門本名稷門儀禮先俟于門外婦至壻揖婦入及寢門揖入士㛰禮此士之二門也天子之雉闕門兩觀諸侯之雉臺門一觀天子外闕諸侯內闕何注天子雉門兩旁築土為臺而虛其中望之闕然故謂之闕臺上有屋懸國典以示人巍然而髙故謂之象魏以其示人故謂之觀諸侯不為兩觀惟于門上為觀故但謂之臺門天子之闕向外開張所治逺也諸侯之闕向內開張所治近也闕以內有宗廟有社稷闕以外有府有庫殷之時右宗廟左社稷周之時右社稷左宗廟故魯以毫社為廟屏天子有六府有五庫諸侯未詳魯惟見有長府而已廟社在內尊而重之也府庫在外輕財故逺之也右觀周禮正月之吉懸治象之法于象魏使萬民觀治象挾日而斂之大宰挾日十日也斂之仍藏于象魏之室竹書成王二十一年除治象康王二十一年魯築茅闕門昭王元年復設象魏按此則魯之有兩觀因周廢象魏而作後周復而魯仍之不革耳春秋定公二年夏雉門及兩觀災冬新作雉門及兩觀哀公三年夏司鐸火季桓子至命御公立于象魏之外命救火者傷人則止財可為也命藏象魏曰舊章不可亡也據此則知府庫與象魏相接舊章在象魏之室命徙他處而藏之記仲尼與于蠟賔事畢出遊于觀之上禮運孔曰孔子出廟門往雉門禮送女母不出祭門諸母兄弟不出闕門穀梁傳范氏寧曰祭門廟門闕即觀也在廟門外按鄭氏舊說廟社在庫門內秦蕙田謂在雉門內證此二書則秦說是也且以廟社位庫門內則府庫皆無所容而季桓子財可為也之語亦無謂矣故斷從雉門內傳設兩觀天子之禮也公羊傳天子諸侯臺門此以髙為貴也家不臺門言有稱也禮器路以內內朝路以外治朝天子庫以外諸侯庫以內外朝內朝即路寢也日聽政于此宗人嘉事圖于此又曰燕朝治朝日見羣臣于此又曰正朝外朝則詢萬民之朝也治朝在二朝之中對路寢言則曰外對庫門言又曰內右朝周禮朝士掌外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右胏石達窮民焉棘取其赤心而外刺槐取懷逺為義嘉石取有文胏石取其赤小司寇掌外朝之政致萬民而詢焉王南面三公及州長百姓北面羣臣西面羣吏東面小司寇擯以叙進而問焉俱秋官一國危一國遷一立君三者事大故謀及庶人也司士正治朝之位王南向三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上太僕大右小臣御僕在路門之左南面西上夏官王族故士謂嘗為士今退而留宿衛者未嘗為士者不得與大右司右也治朝無堂即門以為朝見羣臣故在門左右燕朝太僕正位掌擯相王不眂朝則辭于三公及孤卿夏官外有九室九卿朝焉考工記九室在路門左右羣臣日治事之所書盤庚遷于殷民不適有居王命衆悉至于庭此外朝以詢萬民者記天子皮辨以日視朝諸侯朝服以日視朝此即治朝朝畢即退退適路寢聽政此即內朝于時諸侯復逆太僕掌之公孤復逆小臣掌之羣吏復逆掌于御僕庶民之逆宰夫掌之若君有所命臣有所請則過位入內朝升堂使人視大夫大夫退然後適小寢釋服臣將適公所沐浴居外寢史進象笏書思對命此大夫內朝既服習容觀玉聲乃出揖私朝輝如也此大夫外朝俱玉藻魯語天子諸侯合民事于內朝兼燕朝治朝合神事于外朝如卜郊獻命庫門內自卿以下合官事于外朝凡廟社民人之事合家事于內朝冠昏宗族之事萬斯大謂私朝即正寢大夫無二朝敬姜語乃因季氏僭禮後言非先王制則玉藻明有乃出字廟外為門中為堂後為寢此統言廟制門內曰祊門外室亦曰祊左右曰孰孰有堂有室內為內孰外為外孰中以墉别之此分言門也邢氏昺曰門內之祊待賔客之虞正祭求神于此詩祝祭于祊是也門外西室亦曰祊禮器為祊于外是也愚按周禮祭五祀于宫商祭五祀于廟逸中霤禮祀竈先設席于廟門之奧東西又設主于廟門外之東西面祭主訖乃迎尸于奧是門外有西室也大戴禮諸侯釁廟夾室割雞于室中注門夾之室是門東西皆有夾室也爾雅門例之堂謂之孰孫氏炎曰夾門堂也是左右夾門者為堂也白虎通義門必有孰所以飾門知中有墉者以别內外故也堂有房有室有廂有夾室此分言堂也堂五間每間五架就堂之地分為十二區堂得九區北一區為室室東西各一區為房房外各一架為廂廂南各一架為東西堂又南各二架為東西夾室先儒謂大夫士無西夾則疑止四間矣朱子謂堂五架以當棟為中前二架後二架則實四架耳愚疑天子祫祭羣尸皆入太室受祼一架之地何以容之吳紱謂一架止就柱之著地者言之兩柱間有小梁梁上用短柱即兩架三架亦成一架而已房室之外曰堂兩序之門曰堂兩階之上曰堂堂有階屬諸序又析言之所謂堂得九區者也賈公彥曰堂上行事非一所近戶則言戶東戶西近房則言房外之東房外之西近楹則言東楹西楹東楹之東西楹之西近序則言東序西序近階則言東階西階惟半以南無所係屬乃専言堂堂之北為室室北墉西墉東墉南墉中諸南西為牖東為戶東半以東猶墉也室以內西南隅謂之奧西北隅謂之屋漏東北隅謂之宧東南隅謂之窔奧窔之間謂之冥室以外戶牖之間謂之扆室于堂得一區當室北之中三面皆墉惟南近東為戶或以為北有牖非也惟私室有北出小牖詩所謂塞向是也黃氏越謂室四面有戶此明堂之室非廟室也奧窔四句本爾雅釋宫之文古者以奧為最尊故人子居不主奧其廟之室則主在焉詩所謂宗室牖下是也屋漏之地與牖相向受牖之光光所漏入處故謂之屋漏祭畢則設饌于此為陽厭禮所謂當室之白是也宧養也奉養之物自此而進故謂之宧在廟則視所常立處也窔亦隱也在戶扇之後亦隱而不見禮既夕篇所謂掃室聚窔是也冥爾雅無文詩噦噦其冥朱傳冥奧窔三間則當屬之此也扆倚也天子朝諸侯畫黼文于屏上而身倚之故謂之斧扆王制所謂天子當扆而立是也諸侯以下無扆則但謂之戶牖之間室東為東房西為西房東墉西墉南戶中諸墉東房半以北曰北堂堂有階達諸寢房于室東西各得一區亦在堂之北士冠禮陳服于房中西墉下是西有墉也贊者立房中西面朱子曰背負東牆是東有墉也冠者房中南面立朱子曰當南壁東西之中是戶在南墉之中也鄉飲酒禮尊于房戶之間是東房之戶與室户近而房户之西有墉也特牲禮宗婦北堂東面北上鄭云東房無北壁故得北堂名是北無墉也尊兩壺房中西墉下南上內賔在其北東面南上是東房分半以為北堂而半以南為房中也蓋分言之則半以南為房中半以北為北堂若通言之則房中亦謂之北堂凡祭主婦位北堂之北南面此君母之位故後世因稱母為北堂也大射禮工人士梓人司宫皆位北堂下升自北階是北有階也書一人冕執鋭立于側階孔氏安國云側特也側階北下階西房無北階惟東有之故曰特鄭云大夫士無西房蓋天子諸侯室廣故止一區大夫士室狹故通西房一區為室也周氏欽據詩大房注謂足下有跗如堂房則房兩邊當窔出在堂如跗愚按如此則尊于房戶之間殊難安頓恐未必然房東為東廂西為西廂北墉東墉西墉南户屬諸堂東為東堂西為西堂東西二間通言之皆謂之廂分言之則北一架為廂南二架為夾室中一架為東西堂也知其然者親廟無夾室而諸侯遷廟禮君就東廂西面祝就西廂東面避如食間以其避知必有墉也以其無夾室而有廂知必近房也覲禮几俟于東廂以其俟知去扆不逺也郭氏璞云廂夾室前堂蓋以東西夾室北戶則東西堂在其前故以北為前也特牲禮几席兩孰在西堂鄭云西堂西夾室前近南賔與長兄弟之薦自東房其餘在東堂鄭云東堂東夾室前近南此蓋以東西廂為夾室也書一人冕執劉立于東堂一人冕執鉞立于西堂漢孔氏云東西廂之前堂蓋廂之戶南向則堂在其前此又以南為前也陸氏隴其曰曰廂曰序通在堂上自其近牆者言則曰序自楹至牆一間統言之則曰廂今人指堂下廊廡為廂非爾雅所謂愚按陸知廂在堂上是已但謂自楹至序牆一間亦非也東楹之東西楹之西東階西階之上正行禮之地安有可避處而遷廟禮曰避如食間乎周欽云據郭鄭二說是廂在夾室南堂又在廂與夾室之南愚按如此則堂在東南隅西南隅偏而不可言堂矣堂上東西牆曰序序東為東夾室西為西夾室南墉東墉西墉北戶偏諸東東為東堂西為西堂堂有階達諸婦人之闈門郭氏曰謂之序者以其次序分别內外親疏之序而名也曹氏曰夾室半以南為之知北戶偏諸東者兩夾室皆藏祧主主必東向以正室戶偏于東知夾室亦然也知東堂西堂皆有階者書一人冕執戣立于東垂一人冕執瞿立于西垂孔氏穎達云言垂者堂上之逺地當于序外東西階上古人謂之東下階西下階愚按奔喪禮婦人升自東階此東下階也特牲禮主婦視饎爂于西堂下或兩敦陳于西堂此西下階也雜記夫人入自闈門升自側階知升側階必自闈門入也燕禮賈疏云東面階西面階婦人之階非男子所升則康王之誥所云側階孔以為北階者得之鄭王以為東下階非也王氏樵謂王宅憂路寢之東夾室往還必由東下階故儀衛特盛愚謂東下階可由則此階何不可由且東下階已有執戣而立者何東階備之重西北階虛無人耶其當從孔氏明矣按漢孔氏又謂東房東夾室西房西夾室則以夾中央正室而言非藏祧主之夾室也鄭又謂序者堂上東西廂之牆則以夾室亦通名廂也惟鄭言東廂東房之東當夾室北及東夾室在東房之東南二條甚明耳祖廟有夾室祧廟有夾室親廟無夾室祖廟后稷廟其夾室藏不窋以下祧主祧廟文武二世室其夾室藏成康以下祧主親廟無祧主可藏故不必有夾室也或言無夾者并無廂然遷廟禮言君就東廂祝就西廂則親廟無夾而有廂矣室有東西廂謂之廟無東西廂有室謂之寢此二句亦爾雅文邢曰以明寢廟之異制也鄭曰廟以棲神其處尊故在前寢以藏衣冠視廟為卑故在後愚按寢無廂者婦人有事于廟無事于寢則不必設東西二階而廂夾室連為一也其必有室者正室藏先公衣冠東西夾室藏文武以下祧主衣冠也其堂則用之以燕焉堂無室謂之榭廟無寢謂之祧上句亦爾雅文鄉射禮豫則鈎楹內堂則由檻外鄭曰豫讀為宣榭之榭朱子曰堂有室則四分其堂去一以為室故淺而由楹前榭無堂則全得四分以為堂故深而由楹內是榭無室也但先儒皆以宣榭為宣王之廟其制如榭愚謂廟主必藏于室之奧若無室何以藏主豈宣榭固宣王之射堂而先儒附合為廟歟周禮𨽻僕掌五寢糞除灑掃之事鄭云二祧無寢故止五寢蓋寢以藏衣冠祧自文武以下衣冠皆藏太祖廟之夾室故也天子之廟祖一祧二昭二穆二諸侯之廟祖一昭二穆二大夫之廟祖一昭一穆一祧左右列諸祖之南昭左穆右屬諸祧之南諸侯大夫無祧昭穆屬諸祖之南適士無祖昭一穆一祧二即世室也昭二穆二髙曽祖考也列分而為左右屬以次相繼也適士曽祖與考同廟一廟之外周以垣垣有閎閎兩鄉二廟之間亘以垣垣有門門達鄉七廟之外統以垣垣有門門午鄉諸侯二廟之外間以垣垣有閎閎西鄉四廟之右夾以垣垣有閣閣南鄉一廟之垣曰宫七廟五廟之垣曰都宫兩鄉昭宫穆宫之閎門東西兩兩相對也達鄉太祖之廟門與都宫之門直達而出皆南鄉也朱子曰江都集壇廟制諸侯立廟在中門外之左古者宗廟之制外為都宫內各有寢廟别有門垣太祖在北左昭右穆以次而南愚按聘禮公揖入每門每曲揖賈疏言諸侯三門應門為中左廟右社入大門東行即至廟門其得有每門者諸侯五廟太祖居中二昭居東二穆居西皆别門門外兩邊皆有南北隔牆隔牆中央通門祖廟以西隔牆有三則閣門亦有三東行經三門乃至太祖廟門中則相逼入門則相逺是以每門皆有曲每曲即相揖也愚細思之當是天子太祖之門道當三昭三穆之中諸侯之門道當二昭二穆之西故曰祖廟以西也二穆之西隔牆有二折而東行入太祖廟又一隔牆故曰隔牆有三也自庫門而東曰曲自都門而北曰曲入廟門左右折曰曲此明入廟之道也天子之廟入都宫北行歷三門至太廟諸侯之廟入都宫北行又折而東亦歷三門乃至太廟廟中路謂之唐堂途謂之陳二句爾雅唐相逼陳相達唐廟中路入門當中者也入必經此故相逼陳當東西階路也分東西故相達詩疏混唐陳為一非是階下謂之庭庭左右謂之位中庭而立者謂之碑位序列之位當夾室之南碑所以麗牲者堂稜謂之廉廉以下謂之戺堂之邊逺謂之垂右廟記王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟達廟為祧有二祧去祧為壇去壇為墠壇墠有禱祭之無禱乃止諸侯立五廟無二祧祭法築土曰壇除地曰墠考父也王考祖也皇考曽祖顯考髙祖此四廟為四親祖考則始祖也二祧世室也鄭云周為文武廟遷主藏焉以其藏祧主故謂之祧以功德不遷故謂之世室文武以下祧主藏于二祧文武以上祧主藏于太廟之夾室若有祈禱之事則近者築土為壇逺者除地為墠出主以祭之也諸侯無二祧則其主皆藏于太廟之夾室孔云以太廟藏祧主故亦謂太廟為祧聘禮稱不腆先君之祧是也按七廟之說先儒互異為后稷始封文武受命三廟不毁與四親廟而七者鄭𤣥韋𤣥成馬昭張融說也謂三昭三穆與太祖而七文武為宗不在此數者劉歆王肅說也朱子常是劉歆謂恐功德者多占了七廟之數然愚于此有疑焉古者建國分為九區于前一區又分為三中朝左廟右社是其地已有限矣立廟之制外為都宫內列七廟其制又有定矣若有功德必各建一世室萬一功德者多都宫之內曽可容乎欲毁都宫而更建都宫之外有虛地乎王謂天子諸侯皆四親廟則尊卑不别愚謂天子始建宗廟而七諸侯始建宗廟而五則尊卑已有别矣若欲于四親之上加二親則髙曽之上何稱顯考廟之上何號古今書傳不偶一見乎馬昭引禮緯云唐虞五廟夏初四廟無太祖子孫宗禹而五殷初祖契與親廟而五子孫宗湯而六周祖后稷與親廟而五子孫宗文武而七是始即建七廟而虛功德二廟以待其人而入故曰七世之廟可以觀德也或疑七廟無虛主愚謂孔子此言以明齊車之必載祧主非謂始立廟時也若始立廟如魯公初封周公尚在王季文王不可入諸侯之廟是五廟皆虛也烏得概謂無虛廟乎或謂廟無一主限于二祖則有功德者多何以處之愚謂孔子此言為齊桓作僞主亦納于廟言之謂一人不可作二主非謂一廟不可有二主也若商之雍已大戊外壬河亶甲周之懿孝匡定皆凡弟嗣位必並祔而同祧親廟有二主祧廟何必無二主乎故愚謂二祧既立有其人則實之無其人則虛之功德多則昭皆入東世室穆皆入西世室而七廟必無增損也或謂同堂異室以西為上朱子常論其始失于漢明帝謂於太祖既䙝而不嚴于親又壓而不伸愚謂禮有經有權朱子此論以責父子祖孫當異廟而不為耳恐不可以概兄弟嗣位也朱子議祫禘以太祖為昭太宗為穆蓋徇宋之失禮而言觀欽宗髙宗當為一世而同祧一疏則知朱子所云昭常為昭穆常為穆者為定論而欽昭髙穆為徇時失而非定論矣且必如其說則商之陽甲兄弟四人繼立今使小乙稱其叔兄小辛為父仲兄盤庚為祖伯兄陽甲為曾祖叔父南庚為髙祖而其父祖丁祧毁不祭心安乎理得乎名正而言順事成乎以視同堂異室之壓而不尊孰輕孰重故愚謂兄弟嗣世必同堂而異室並祔而同祧而七廟必無增減也周氏亦魯曰文武二世室必周公制禮時所定懿孝之間君臣昏弱何人能定此大典斯言得之方氏若珽曰諸侯受封不過奉職謹度若勤王勘亂則在王朝功宗元祀之列故無功德二廟斯言亦得之或問夏初四廟何也曰無可為始祖者也天子非受命于天不為始祖諸侯非受命于王不為始祖詩曰履帝武敏歆此后稷受命之符也天命𤣥鳥降而生商此契受命之符也書曰天錫禹洪範九疇此禹受命之符也故禹前無可為始祖者太祖廟不得不虛之也後世帝王崛起其禮皆然漢元瘞太上主於圉陵晉初祀征西六世唐初祀宣簡四世宋初祀六世皆有昭穆而虛太祖司馬溫公謂太祖未正東向之位故止祀三昭三穆太祖已正東向之位乃並昭穆為七廟是也王安石以僖祖為始祖謬矣程子是安石而朱子從之謂推本太祖之孝思愚謂此義非也履南郊而議諡曰幽曰厲豈孝子之欲哉奉天以衡之義有所不得私也不然周公不追王祖紺豈太王無孝也可推虞帝不追帝瞽瞍豈舜不知尊其父耶朱子常云功德有無之實天下後世自有公論若必以子孫擇其先祖為嫌則秦政之惡夫子議父臣議君而除諡法不為過觀此則其但曰推本太祖之孝思者豈定論哉祭于廟燕于寢詩傳寢廟寢也朝之制如廟路寢之制如廟其庭無碑碑所以麗牲故朝與寢無之也遷廟禮言奉衣服者至碑君從按三年內主在殯宫殯宫即路寢也豈以主在殯宫亦以殯宫為廟薦新朔奠皆用牢禮故特設之碑而非是則無碑歟朝以內謂之路寢路寢以內謂之燕寢路寢謂之正寢燕寢謂之小寢路寢有廂有堂有夾室小寢有夾室此記朝寢之異也小寢無東下階西下階故無堂與廂而通為夾室夾室謂之達達中庋物謂之閣天子之閣左達五右達五諸侯于房中五大夫于閣三士于坫一小寢之夾室通堂與廂之地為之故謂之達崔氏靈恩曰宫室之制中央為正室正室左右為房房外為序序外為夾室天子尊庖厨逺故左右夾室各為五閣以庋飲食諸侯卑庖厨近故于一房中為五閣大夫無嫌故亦于夾室為三閣士最卑但于室中為一坫而已五閣牛羊豕魚臘三閣魚豕臘也愚按諸侯之閣當在西房所以知者東房有北階為后夫人往來之地不當置閣也天子之路寢一小寢五王后之適寢一小寢五左右媵之寢三娣姪以下居側室其御序于王寢孔曰王六寢正寢在前燕寢五一東北春居之一東南夏居之一中央夏季居之一西南秋居之一西北冬居之后六寢其居亦然愚按白虎通義言天子娶于三國九女或曰娶四國十二女周禮止于九嬪無三夫人其世婦以下不言數蓋內之六宫猶外之六卿公孤不必備皆六卿兼之則知三夫人九嬪皆不必備也考工記言內有九室九嬪居之可知娶三國則二媵娶四國則三媵三媵各有娣姪則三寢而别為九室也皇氏侃曰夫人以后下寢之上為適寢也婦以夫人下寢之上為適寢則又似夫人各有三寢也其詳不可考矣諸侯夫人正寢一小寢二大夫命婦正寢一小寢一士正寢一妻內寢一左右為側室內子未命居下室下室即小寢也既命乃居正寢何氏休曰天子諸侯皆三寢一髙寢一路寢一小寢與周禮異疑非天子之側室曰蔞室諸侯之側室曰晏室大夫之側室曰幽室青史氏之記曰王后有身之七月就蔞室是天子之側室名蔞室也大戴禮后夫人七月就晏室是諸侯之側室名晏室而天子亦或通稱也劉向說苑幽室數辱之産是大夫以下名幽室也寢南向側室亦南向皆有堂有東階西階本孔疏后夫人之寢在王寢之北曰北宫天子六宫諸侯三宫夫人中宫左媵東宫右媵西宫此又明后夫人之寢亦名宫也夫人謂諸侯之夫人若天子之三夫人即左右媵矣右寢書延入翼室恤宅宗成王崩延太子釗入路寢之東夾室為居憂主越七日命狄設黼扆綴衣牖間南向敷重篾席華玉仍几天子七日而殯既殯乃傳顧命不知神之所在故兼設平生之坐孔云此平日見羣臣覲諸侯之坐愚按覲諸侯于廟無在路寢者此但設其坐以象之或篾席玉几覲諸侯時所用耳西序東向敷重底席文貝仍几孔云此旦夕聽事之坐愚按退適路寢聽政在兩楹間南向無在西序東向者此亦以几席象之耳東序西向敷重豐席雕玉仍几孔云養國老饗羣臣之坐愚按養國老于學饗羣臣于廟亦無路寢者西夾南向敷重筍席漆仍几越玉五重孔云此親屬私燕之坐金氏履祥曰此新陟王殯宫之坐加玉五重欲尸不腐也愚按金說甚允蓋周人殯于西階之上諸侯近階故告子生不盡階一等大夫士殯于客位則稍偏近中惟天子則正位西房之外當棟也以夾中堂故以西夾言之不言西夾室不于室中也金氏直以為西夾室微誤蓋室中不可南向也孔以為親屬私燕之坐亦確蓋不以族人為賔故不居主位而以異姓為賔又不可居賔位故其位在此居尊也赤刀大訓𢎞璧琬琰在西序大玉天球河圖在東序西序東序既設坐而又陳寶者金氏曰坐在序端近階陳寶在其北也𦙍之舞衣大貝鼗鼓在西房兊之戈和之弓埀之竹矢在東房文器西武器東尚文也殯在西故以西為尚大輅在賔階面綴輅在阼階面面謂向南先輅在左孰之前次輅在右孰之前孰門內孰前謂向北二人雀辨執惠立于畢門之內二人夾門四人綦辨執戈上刃夾兩階戺堂廉曰戺四人夾階一人冕執劉立于東堂東廂東夾之前堂一人冕執鉞立于西堂西廂西夾之前二人堂上一人冕執戣立于東垂東下階之廉上一人冕執瞿立于西垂西下階之廉上一人冕執鋭立于側階側特也北止一階故曰側階北下階之廉上其序自外而內自下而上自中而邊自南而北也記夫人奔喪入自闈門升自側階君在阼雜記夫人來奔父母喪君雖在阼待之而必自側階升男子之階非婦人敢由也此以上證君路寢傳后夫人將侍君至于房中釋朝服襲燕服然後入御于君雞鳴太師奏雞鳴于陛下夫人鳴佩玉於房中告去少師奏質明于陛下夫人入庭立君出朝焉尚書大傳后夫人于君皆先朝行拜下禮君辭之由東下階升成拜其來去皆自北下階庭路寢之前庭也周禮女御掌御叙于王之燕寢鄭云女御叙御防上之専妬也見星往還此以上證君燕寢傳齊侯殺國佐于內宫之朝左傳孔曰夫人朝羣妾之處按君燕息不入后夫人之宫而后夫人治家之朝君得蒞之者或事大后夫人不能専斷也此以證后夫人之適寢禮后夫人七月就晏室嬪婦則三月就側室大戴禮后夫人聽內政故有娠七月乃就晏室嬪婦無事故就側室卑也子生三月妻以子見于父夫入門升自阼階西鄉妻抱子出自房當楣立姆曰敢用時日祇見孺子內則子大夫適子鄭云側室之門愚謂燕寢之門妻升北階故自房出不于適寢避君也君夫人則立于阼西向世婦袍子升自西階諸侯世子見于路寢夫人尊不親抱子婦人不由南面之階此抱子升成子禮也禮子不由阼階適子庶子見于外寢后夫人生而非世子故于燕寢妾子見于內寢適妻之寢蓋又降矣天子則升自阼階妃抱世子自房出新書諸侯避天子故子升自西階大夫卑無嫌也君夫人卒于路寢大夫世婦卒于適寢內子未命死于下室遷尸于寢士之妻皆死于寢喪大記夫人正寢亦名路寢男女死各于其寢厚别以正終也未命則降禮之殺也皇氏謂世婦以夫人小寢之上為適寢得之熊謂妻皆死于夫之寢夫人死君之路寢世婦死君小寢之上非也此以上以證大小寢側室路寢門左右謂之孰朝門左右廟門里門左右皆謂之孰邢氏昺曰夾門東西者名孰白虎通義所以飾門因名見臣下當于此熟思其事而後進也右孰士喪禮陳一鼎于寢門外當東孰此寢門外孰士虞禮匕俎在西孰之西此寢門內孰士冠禮筮人取筮于西孰此廟門外孰聘禮擯者退負東孰而立此廟門內孰記古之教者家有孰樂記孔云孰在二十五家之閭門愚按天子小學在虎門之東諸侯小學在公宫南之左大夫以外凡教幼學者通謂之孰不必定在閭門上老平明坐于右孰庶老坐于左孰漢志此則里門之孰也吳鼎曰明堂北面故以西為左孰東為右孰若里孰則分西北不分東西愚謂門外南面則仍以東為左西為右矣若里門則以南為左孰北為右孰北孰上南孰下也堂孰間者謂之寧蔽外內者謂之屏內寢屏路寢屏闕門屏外朝屏廟門屏軍門屏屏謂之樹天子外屏諸侯內屏寧在天子路門之外應門之內兩孰之間佇立于此以待諸侯故謂之寧郭氏璞曰樹小牆當門中鄭云今桴思也刻之為雲氣蟲獸孔云罘罳小樓城隅闕上皆有之邢曰以自障蔽鄭曰以蔽行道也愚按諸說似屏有二種一種築土為之常立不動一種刻木為之使可移徙要其上為屋形以覆下同也陳氏祥道曰凡門皆有屏吳鼎曰惟路門有屏似陳得之又謂之罘愚者孔曰人臣至此俯伏思念其事論語謂之蕭牆何氏晏曰蕭之言肅君臣相見至此加肅敬也右寧屏詩俟我于著乎而齊風孫氏炎曰著與寧同君不親迎婦至此始見其俟已也記天子當依而立諸侯北面而見天子曰覲天子當寧而立諸公東面諸侯西面曰朝曲禮鄭曰春朝受贄于朝受享于朝秋覲一受之于廟愚按諸侯屏在路門內則大夫之朝自不見內天子屏在路門外近應門則諸侯朝于屏內不直見寢內乎或閉路寢門乃見歟王背屏而立夫人向屏王出夫人送王不出屏吳語王越句踐此內寢之屏過位色勃如也論語此諸侯路寢門內之屏臺門而旅樹雜記鄭注旅道也此闕門之屏疏屏天子之廟飾也明堂位此廟門之屏命侯及七騶咸駕整旅于屏外月令孔曰田獵揭旃以為門驅而入既門外驅車入則不得有屏蓋車入之時則去屏無事之時則設屏也方氏慤曰必設屏者王雖在野亦莫不有內外之辨故也愚按此則屏可移徙不惟築土為牆矣傳天子外屏不欲見外也諸侯內屏不欲見內也荀子按此則天子雖外朝詢萬民亦當設屏矣宫室考卷上
