body:
  text: 宫室考提要臣等謹案宫室考二卷國朝任啓運撰啓運有周易洗心已著録是書于李如圭釋宫之外别為類次曰門曰觀曰朝曰廟曰寢曰孰曰寧曰等威曰名物曰門大小廣狹曰明堂曰方明曰辟雍考據頗為詳核惟謂房東為東廂西為西廂北墉東墉西墉南户屬諸堂東為東堂西為西堂堂上東西墻曰序序東為東夾室西為西夾室南墉東墉西墉北户偏諸東東為東堂西為西堂如其所說則東西廂在房之東西東西夾室在堂之東西東西廂之南東西夾室之北則曰東西堂矣然考之經傳實全無根據儀禮覲禮記注曰東廂東夾之前相翊待事之處特牲饋食禮注曰西堂西夾之前近南疏曰即西廂也爾雅釋宫曰室有東西廂曰廟郭璞注曰夾室前堂據此則東西廂即東西堂明在東西夾室之前而啓運謂在東西夾室之後誤矣公食大夫禮曰公揖退于廂下公受宰夫束帛以侑西鄉立注云廂東夾之前俟事之處受束帛於序端蓋東廂即接序端公當於序端受帛故先立于東廂以俟之地近則事便也若東廂在東房之東夾室之北則南距序端中間隔一正堂使于此而俟事則往來不便孰甚焉是以經證啓運之說無一相合又漢書周昌傳吕后側耳于東廂聽顔師古注曰正寢之東西室皆曰廂若東廂僻在房東逺在夾北則又何從側耳聽乎又金日磾傳莽何羅從外入從東廂上見日磾色變走趨卧內蓋從東堂趨室內故云從外入也若東廂在房東夾北則是從內出矣後漢書周舉傳天子親自露坐德陽殿東廂請雨則東廂不隱在房東夾北明矣是以史證啓運之說亦無一相合且儀禮燕禮小臣共槃也在東堂下注曰為公盥也下又云公降盥蓋降東階就槃也故共槃也在東堂下就近也啓運謂東堂在東夾北則是公降盥于東夾北之堂下豈經義乎又特牲饋食禮主婦視饎爂于西堂下注曰近西壁南齊于坫如東堂在東夾北則注于堂下當云北齊于坫矣啓運不究儀禮全經自立新說故其失如此又謂周之為學者五中曰成均左之前曰東膠左之後曰東序右之前曰瞽宗右之後曰虞庠于四郊先為四國學南之東曰東膠北之東曰東序南之西為瞽宗北之西為虞庠今考周太學曰東膠在今宫南之左小學曰虞庠在西郊見於王制注三代之學所在無文至劉敞始謂辟雍居中其北為虞學其東為夏學其西為殷學至陸佃禮象始謂辟雍居中其南為成均北為上庠東為東序西為瞽宗啓運蓋襲其說遂謂四代之學皆在學中而不考其無所本又三禮義宗曰凡立學之法有四郊及國中在東郊謂之東學在南郊謂之南學在西郊謂之西學在北郊謂之北學故鄭注祭義曰周有四郊之虞庠據此則周特為虞庠於四郊而啓運謂並立東序瞽宗于郊尤為特創不足據也他若謂宗廟在雉門內引禮運仲尼與於蠟賔事畢出遊于觀之上榖梁傳禮送女母不出祭門諸母兄弟不出闕門如此之類則頗為精審可以與鄭注相參矣儀禮一經久成絶學啓運能研究鉤貫使條理秩然雖間有疵謬而大致精核要亦不愧窮經之目矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
